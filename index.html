<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>City 9Twin - Login</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .login-card {
      width: min(520px, 95vw);
    }
    .brand {
      text-align: center;
      margin-bottom: 14px;
    }
    .brand svg {
      width: 54px;
      height: 54px;
      fill: var(--gold);
    }
    .demo-accounts {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .demo-account {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      transition: var(--transition);
      background: rgba(255, 255, 255, 0.03);
    }
    .demo-account:hover {
      border-color: rgba(200, 180, 140, 0.6);
    }
    .secure {
      margin-top: 12px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
    .password-wrap {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="card login-card">
      <div class="brand">
        <svg viewBox="0 0 24 24"><path d="M2 20h20v2H2v-2zm2-2h4V8H4v10zm6 0h4V4h-4v14zm6 0h4v-7h-4v7z"/></svg>
        <h1>City 9Twin</h1>
        <p class="kpi-sub">Plataforma de gemelo digital para gestión de tráfico urbano</p>
      </div>

      <div id="login-banner"></div>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">Correo electrónico</label>
          <input id="email" type="email" placeholder="usuario@city9twin.com" />
          <div id="email-error" class="error-text"></div>
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <div class="password-wrap">
            <input id="password" type="password" placeholder="••••••••" />
            <button id="toggle-password" type="button" class="btn btn-secondary">Mostrar</button>
          </div>
          <div id="password-error" class="error-text"></div>
        </div>

        <button class="btn btn-primary" style="width:100%" type="submit">Iniciar sesión</button>
      </form>

      <h3 style="margin-top:16px">Credenciales de prueba</h3>
      <div id="demo-accounts" class="demo-accounts"></div>

      <div class="secure">Conexión segura TLS 1.3 🔒</div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app-state.js"></script>
  <script src="js/audit.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="pages/index.js"></script>
</body>
</html>
