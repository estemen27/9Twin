<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>City 9Twin - Usuarios</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <div id="app-layout">
    <div id="page-content" style="display:none; width:100%">
      <section class="card">
        <div style="display:flex; justify-content:space-between; align-items:center">
          <h3>Gestión de usuarios</h3>
          <div style="display:flex; gap:8px; align-items:center">
            <input id="buscar-usuarios" placeholder="Buscar por nombre, email o rol" style="max-width:320px" />
            <button id="nuevo-usuario" class="btn btn-primary">Nuevo usuario</button>
          </div>
        </div>
        <div class="table-wrap">
          <table id="tabla-usuarios">
            <thead><tr><th data-sort>ID</th><th data-sort>Nombre</th><th data-sort>Email</th><th data-sort>Rol</th><th data-sort>Estado</th><th data-sort>Último acceso</th><th>Acciones</th></tr></thead>
            <tbody id="body-usuarios"></tbody>
          </table>
        </div>
        <div class="pagination">
          <button id="prev-user" class="btn btn-secondary">← Anterior</button>
          <span id="page-info-user"></span>
          <button id="next-user" class="btn btn-secondary">Siguiente →</button>
        </div>
      </section>
    </div>
  </div>

  <div id="modal-user" class="modal" aria-hidden="true">
    <div class="modal-content">
      <button class="modal-close">×</button>
      <h3 id="mu-title">Nuevo usuario</h3>
      <div class="field"><label>Nombre completo</label><input id="u-nombre" /><div id="e-nombre" class="error-text"></div></div>
      <div class="field"><label>Email</label><input id="u-email" /><div id="e-email" class="error-text"></div></div>
      <div class="grid grid-2">
        <div class="field"><label>Contraseña</label><input id="u-pass" type="password" /><div id="e-pass" class="error-text"></div></div>
        <div class="field"><label>Confirmar contraseña</label><input id="u-pass2" type="password" /><div id="e-pass2" class="error-text"></div></div>
      </div>
      <div class="field"><label>Rol</label><select id="u-rol"><option>Administrador</option><option>Operador de Tráfico</option><option>Planificador</option><option>Observador</option></select></div>
      <div class="field"><label>Estado inicial</label><select id="u-estado"><option value="true">Activo</option><option value="false">Inactivo</option></select></div>
      <div id="mu-note" class="kpi-sub"></div>
      <button id="guardar-user" class="btn btn-primary" disabled>Crear usuario</button>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app-state.js"></script>
  <script src="js/audit.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/sidebar-template.js"></script>
  <script src="pages/usuarios.js"></script>
</body>
</html>
