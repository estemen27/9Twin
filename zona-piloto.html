<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>City 9Twin - Zona Piloto</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <div id="app-layout">
    <div id="page-content" style="display:none; width:100%">
      <div class="grid" style="grid-template-columns:2fr 3fr; gap:12px;">
        <section class="card">
          <h3>Configuración de zona</h3>
          <div class="field"><label>Nombre de zona</label><input id="zona-nombre" /></div>
          <div class="field"><span id="zona-estado" class="badge badge-green">ACTIVA</span></div>

          <div class="field">
            <label>Importar GeoJSON/CSV</label>
            <div id="dropzone" class="dropzone">Arrastra tu archivo GeoJSON o CSV aquí o haz click para seleccionar</div>
            <input id="file-input" type="file" hidden />
            <div class="progress-wrap" style="margin-top:8px"><div id="import-progress" class="progress-bar"></div></div>
            <div id="import-result" style="margin-top:8px"></div>
            <details>
              <summary>Registros inválidos</summary>
              <div id="invalid-list"></div>
            </details>
          </div>

          <h4>Editor de polígono</h4>
          <div class="grid grid-2">
            <div class="field"><label>Lat SW</label><input id="sw-lat" type="number" step="0.0001" /></div>
            <div class="field"><label>Lng SW</label><input id="sw-lng" type="number" step="0.0001" /></div>
            <div class="field"><label>Lat NE</label><input id="ne-lat" type="number" step="0.0001" /></div>
            <div class="field"><label>Lng NE</label><input id="ne-lng" type="number" step="0.0001" /></div>
          </div>
          <button id="recalcular" class="btn btn-secondary">Recalcular área</button>
          <div class="tooltip-inline" id="validacion-inter">Mínimo 10 intersecciones para activar</div>
          <div style="display:flex; gap:8px; margin-top:8px">
            <button id="activar-zona" class="btn btn-primary">Desactivar zona</button>
          </div>

          <div class="grid grid-3" style="margin-top:12px" id="stats-zona"></div>
        </section>

        <section class="card">
          <h3>Mapa de zona</h3>
          <div style="display:flex; gap:8px; margin-bottom:8px">
            <button class="btn btn-secondary" id="z-in">+</button>
            <button class="btn btn-secondary" id="z-out">-</button>
            <label><input type="checkbox" id="z-nodos" checked /> Nodos</label>
            <label><input type="checkbox" id="z-seg" checked /> Segmentos</label>
            <label><input type="checkbox" id="z-pol" checked /> Polígono</label>
            <label><input type="checkbox" id="z-sem" checked /> Semáforos</label>
          </div>
          <svg id="zona-svg" viewBox="0 0 700 460" style="width:100%; min-height:420px; background:#111a2d; border-radius:8px; border:1px solid var(--border)"></svg>
          <div id="node-info" class="card" style="margin-top:8px">Haz click en un nodo para ver detalles.</div>
        </section>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app-state.js"></script>
  <script src="js/audit.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/map-engine.js"></script>
  <script src="js/sidebar-template.js"></script>
  <script src="pages/zona-piloto.js"></script>
</body>
</html>
